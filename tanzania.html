<!DOCTYPE html>
<html>
<head>
    <title>Tanzania Dashboard</title>
</head>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #2e3600;
}

h1 {
    text-align: center;
}

button {
    display: block;
    margin: 15px auto;
    padding: 10px 20px;
    color: blueviolet;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.tile {
    background: rgb(0, 8, 49);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(83, 40, 0, 0.1);
}
</style>
<body>

    <h1>TANZANIA DASHBOARD</h1>

    <button onclick="loadAll()">Refresh All</button>

    <div class="grid">

        <div class="tile">
            <h2>Zanzibar Weather Information</h2>
            <p id="weather">Loading...</p>
        </div>

        <div class="tile">
            <h2>USD → TZS</h2>
            <p id="rate">Loading...</p>
        </div>

        <div class="tile">
            <h2>Tanzania Population</h2>
            <p id="population">Loading...</p>
        </div>

        <div class="tile">
            <h2>Advice</h2>
            <p id="advice">Loading</p>
        </div>

    </div>

    <script>

        // Population
        function loadPopulation() {
            document.getElementById("population").innerText = "Loading...";

            fetch("https://restcountries.com/v3.1/name/tanzania")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("population").innerText =
                        data[0].population.toLocaleString();
                })
                .catch(() => {
                    document.getElementById("population").innerText =
                        "Population unavailable";
                });
        }

        // Weather
        function loadWeather() {
            document.getElementById("weather").innerText = "Loading...";

            fetch("https://api.open-meteo.com/v1/forecast?latitude=-6.16&longitude=39.20&current=temperature_2m")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("weather").innerText =
                        data.current.temperature_2m + " °C";
                })
                .catch(() => {
                    document.getElementById("weather").innerText =
                        "Weather unavailable";
                });
        }

        // Exchange Rate
        function loadRate() {
            document.getElementById("rate").innerText = "Loading...";

            fetch("https://api.frankfurter.app/latest?from=USD&to=TZS")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("rate").innerText =
                        "1 USD = " + data.rates.TZS.toLocaleString() + " TZS";
                })
                .catch(() => {
                    document.getElementById("rate").innerText =
                        "Rate unavailable";
                });
        }

        // Advice
        function loadAdvice() {
            document.getElementById("advice").innerText = "Loading...";

            fetch("https://api.adviceslip.com/advice")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("advice").innerText =
                        data.slip.advice;
                })
                .catch(() => {
                    document.getElementById("advice").innerText =
                        "Advice unavailable";
                });
        }

        // Refresh all
        function loadAll() {
            loadWeather();
            loadRate();
            loadPopulation();
            loadAdvice();
        }

        // Initial load
        loadAll();

    </script>

</body>
</html>
